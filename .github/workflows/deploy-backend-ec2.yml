name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend-ec2.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload backend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/home/ubuntu/gold-silver-live-87"
          rm: true # Clean old backend files before upload
          strip_components: 0 # Keep 'backend/' folder structure

      - name: Install deps and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/gold-silver-live-87/backend

            if [ -f package-lock.json ]; then
              npm ci --omit=dev
            else
              npm install --omit=dev
            fi

            pm2 restart goldsync-backend --update-env
            pm2 save
