name: Daily DB Backup Email

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  backup-email:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Run encrypted backup email job
        working-directory: backend
        env:
          MONGODB_URI: ${{ secrets.BACKUP_MONGODB_URI }}
          BACKUP_EMAIL_FROM: ${{ secrets.BACKUP_EMAIL_FROM }}
          BACKUP_EMAIL_TO: ${{ secrets.BACKUP_EMAIL_TO }}
          BACKUP_EMAIL_APP_PASSWORD: ${{ secrets.BACKUP_EMAIL_APP_PASSWORD }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: node scripts/email-backup.mjs
